};

  init() {

    if (resetVersion !== CURRENT_RESET_VERSION) {
      writeJson(LOG_KEY, []);
      localStorage.setItem(RESET_VERSION_KEY, CURRENT_RESET_VERSION);

      writeJson(LOG_KEY, sampleLogs);
    } else {
      writeJson(LOG_KEY, dedupeLogsByDate(savedLogs.map(({

    if (!savedLocations) {

  const month = String(bangkokDate.getUTCMonth() + 1).padStart(2, "0");

};

  const weekday = new Date(Date.UTC(year, month - 1, day)).getUTCDay();

};

  const csv = rows.map(row => row.map(value => {
    const text = String(value ?? "");
    return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
  }).join(",")).join("\n");

    type: "text/csv;charset=utf-8"
